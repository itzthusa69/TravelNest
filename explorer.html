<!-- explorer.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Explorer | TravelNest</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar glass">
        <div class="logo">TravelNest</div>

        <button class="menu-btn" onclick="toggleMenu()" aria-label="Open navigation menu">
            ☰
        </button>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="explorer.html">Explorer</a></li>
            <li><a href="budget.html">Budget</a></li>
            <li><a href="random.html">Random Trip</a></li>
            <li><a href="mood.html">Mood</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>

    <!-- PAGE HEADER -->
    <header class="glass page-box">
        <h1>Destination Explorer</h1>

        <div class="filters">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search destination"
                aria-label="Search destination"
            >

            <select id="continentFilter" aria-label="Select continent">
                <option value="all">All Continents</option>
                <option value="Europe">Europe</option>
                <option value="Asia">Asia</option>
                <option value="Middle East">Middle East</option>
                <option value="Indian Ocean">Indian Ocean</option>
            </select>

            <button onclick="filterDestinations()">
                Search
            </button>
        </div>
    </header>

    <!-- DESTINATION CARDS -->
    <section class="card-section">
        <h2 class="section-title">Popular Destinations</h2>

        <div class="card-container" id="cardContainer"></div>
    </section>

    <!-- MODAL -->
    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal-content">

            <button 
                class="close-btn" 
                onclick="closeModal()" 
                aria-label="Close modal"
            >
                ✖
            </button>

            <!-- Changed h1 to h2 and added default text -->
            <h2 id="modalTitle">Destination Details</h2>

            <p id="modalDescription" class="modal-desc"></p>

            <!-- Fixed heading hierarchy -->
            <h3>Top Attractions</h3>

            <ul id="attractionList" class="attractions-list"></ul>

            <h3>Travel Budget</h3>

            <table class="budget-table">
                <thead>
                    <tr>
                        <th>Budget Type</th>
                        <th>Estimated Cost</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Low</td>
                        <td id="budgetCost"></td>
                    </tr>

                    <tr>
                        <td>Moderate</td>
                        <td id="standardCost"></td>
                    </tr>

                    <tr>
                        <td>Luxury</td>
                        <td id="luxuryCost"></td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="glass footer">
        <div class="footer-bottom">
            <p>&copy; 2026 TravelNest. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
