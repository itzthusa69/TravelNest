<!-- explorer.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar glass">
        <h2>TravelNest</h2>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="explorer.html">Explorer</a></li>
            <li><a href="budget.html">Budget</a></li>
            <li><a href="random.html">Random Trip</a></li>
            <li><a href="mood.html">Mood</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>

    <section class="glass page-box">
        <h1>Destination Explorer</h1>

        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search destination">

            <select id="continentFilter">
                <option value="all">All Continents</option>
                <option value="Europe">Europe</option>
                <option value="Asia">Asia</option>
                <option value="Middle East">Middle East</option>
                <option value="Indian Ocean">Indian Ocean</option>
            </select>

            <button onclick="filterDestinations()">Search</button>
        </div>
    </section>

    <section class="card-container" id="cardContainer"></section>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✖</span>

            <h1 id="modalTitle"></h1>
            <p id="modalDescription" class="modal-desc"></p>

            <h3>Top Attractions</h3>
            <ul id="attractionList" class="attractions-list"></ul>

            <table class="budget-table">
                <thead>
                    <tr>
                        <th>Budget</th>
                        <th>Estimated Cost</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Low</td>
                        <td id="budgetCost"></td>
                    </tr>
                    <tr>
                        <td>Moderate</td>
                        <td id="standardCost"></td>
                    </tr>
                    <tr>
                        <td>Luxury</td>
                        <td id="luxuryCost"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="glass footer">
        <div class="footer-bottom">
            <p>&copy; 2026 TravelNest. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
